<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quản lý bán hàng Nhụy Nguyên</title>

<style>
body { font-family:sans-serif; background:#f4f4f4; padding:10px; }
.branch { background:#fff; padding:10px; margin-bottom:15px; border-radius:8px; }
table { width:100%; border-collapse:collapse; margin-top:10px; }
th,td { border:1px solid #ddd; padding:6px; text-align:center; }
th { background:#eee; }
input,button { padding:5px; margin:2px; }
.low-stock { color:red; font-weight:bold; }
</style>
</head>

<body>

<h1>📊 Quản lý bán hàng</h1>

<div>
  <input id="newBranchName" placeholder="Tên chi nhánh">
  <button onclick="addBranch()">➕ Thêm chi nhánh</button>
</div>

<hr>

<div id="branches"></div>

<script src="../auth.js"></script>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbzfd_pHMmc9qGXJ4iT2LYXg78-WSxXVTHr5O0EeGcs5pa4RlZMB2Gs1xETul4XI-hPFTw/exec';
const TELEGRAM_TOKEN='7783089403:AAGNpG6GsdlF7VXVfPTW8Y1xQJEqBahL1PY';
const CHAT_ID='6249154937';

let salesData={branches:[],logs:[]};

// ===== FETCH =====
async function fetchData(){
  const res=await fetch(SCRIPT_URL);
  salesData=await res.json();
  render();
}

// ===== RENDER =====
function render(){
  const container=document.getElementById('branches');
  container.innerHTML='';

  salesData.branches.forEach((b,bIndex)=>{
    let html=`<div class="branch">
      <h2>${b.name}</h2>

    html+=`<table>
      <tr><th>Món</th><th>Đơn vị</th><th>Tồn kho</th><th>+ Tồn</th><th>Giá</th><th>Bán</th><th>Trừ lỗi</th><th>Hành động</th></tr>`;
    branch.menu.forEach((item,iIndex)=>{
      html+=`<tr>
        <td><input value="${item.name}" onchange="editItem(${bIndex},${iIndex},'name',this.value)"></td>
        <td><input value="${item.unit||''}" onchange="editItem(${bIndex},${iIndex},'unit',this.value)"></td>
        <td><input type="number" value="${item.stock}" onchange="editItem(${bIndex},${iIndex},'stock',this.value)"></td>

<td>
  <input type="number" id="add-stock-${bIndex}-${iIndex}" placeholder="+ thêm">
  <button onclick="addStock(${bIndex},${iIndex})">➕</button>
</td>

<td><input type="number" value="${item.price}" onchange="editItem(${bIndex},${iIndex},'price',this.value)"></td>
        <td><input type="number" id="sell-${bIndex}-${iIndex}" min="1" max="${item.stock}"></td>
        <td><input type="number" id="waste-${bIndex}-${iIndex}" min="1" max="${item.stock}" placeholder="Lỗi"></td>
        <td>
          <button onclick="sell(${bIndex},${iIndex})">Bán</button>
          <button onclick="waste(${bIndex},${iIndex})">Trừ lỗi</button>
          <button onclick="deleteItem(${bIndex},${iIndex})">🗑</button>
        </td>
      </tr>`;
    });

    html+=`</table>

    <h4>➕ Thêm món</h4>
    <input id="name-${bIndex}" placeholder="Tên">
    <input id="stock-${bIndex}" type="number" placeholder="Tồn">
    <input id="price-${bIndex}" type="number" placeholder="Giá">
    <button onclick="addItem(${bIndex})">Thêm</button>

function addStock(bIndex,iIndex){
  const input = document.getElementById(`add-stock-${bIndex}-${iIndex}`);
  const qty = parseInt(input.value);

  if(!qty || qty <= 0) return alert('Số lượng nhập không hợp lệ');

  const item = salesData.branches[bIndex].menu[iIndex];

  item.stock += qty; // ✅ cộng dồn, không phá logic cũ

  // (tuỳ chọn) log lại nhập kho
  salesData.logs.push({
    branch: salesData.branches[bIndex].name,
    item: item.name,
    unit: item.unit || '',
    quantity: qty,
    price: 0,
    type: 'import',
    time: new Date().toISOString()
  });

  saveData();
  input.value = '';
}
// =================== Render báo cáo ===================
function renderReport(){
  const report=document.getElementById('report');
  const grouped={};
  salesData.logs.forEach(log=>{
    const date=log.time.slice(0,10);
    const month=log.time.slice(0,7);
    if(!grouped[month]) grouped[month]={};
    if(!grouped[month][date]) grouped[month][date]=[];
    grouped[month][date].push(log);
  });

  let html='';
  const months=Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
  if(months.length===0){ report.innerText='Không có dữ liệu để hiển thị.'; return; }

  months.forEach((month,index)=>{
    const monthId=`month-${index}`;
    let monthTotal=0; let monthTable='';
    const days=Object.keys(grouped[month]).sort((a,b)=>b.localeCompare(a));
    days.forEach(date=>{
      let dayTotal=0; let dayRows='';
      grouped[month][date].forEach(log=>{
        const amount=log.price*log.quantity;
        dayTotal+=amount; monthTotal+=amount;
        dayRows+=`<tr>
          <td data-label="Ngày">${date}</td>
          <td data-label="Chi nhánh">${log.branch}</td>
          <td data-label="Món">${log.item}</td>
          <td class="numeric" data-label="Số lượng">${log.quantity} ${log.unit||''}</td>
          <td class="numeric" data-label="Giá">${log.price.toLocaleString()}₫</td>
          <td class="numeric" data-label="Thành tiền">${amount.toLocaleString()}₫</td>
        </tr>`;
      });
      dayRows+=`<tr style="background:#f1f1f1;font-weight:bold;">
        <td colspan="5" style="text-align:left;">Tổng ngày ${date}:</td>
        <td class="numeric">${dayTotal.toLocaleString()}₫</td>
      </tr>`;
      monthTable+=dayRows;
    });
    html+=`<div class="month-section">
      <div class="month-header" onclick="toggleMonth('${monthId}')">🗓 Tháng ${month} — Tổng: ${monthTotal.toLocaleString()}₫</div>
      <div id="${monthId}" class="month-content">
        <table>
          <thead><tr><th>Ngày</th><th>Chi nhánh</th><th>Món</th><th>Số lượng</th><th>Giá</th><th>Thành tiền</th></tr></thead>
          <tbody>${monthTable}</tbody>
        </table>
      </div>
    </div>`;

    container.innerHTML+=html;
  });
}

// ===== CRUD =====
function addBranch(){
  const name=document.getElementById('newBranchName').value;
  if(!name) return alert('Nhập tên!');
  salesData.branches.push({name,menu:[]});
  save();
}

function addItem(bIndex){
  const name=document.getElementById(`name-${bIndex}`).value;
  const stock=parseInt(document.getElementById(`stock-${bIndex}`).value);
  const price=parseInt(document.getElementById(`price-${bIndex}`).value);

  if(!name||!stock||!price) return alert('Nhập đủ');

  salesData.branches[bIndex].menu.push({name,stock,price});
  save();
}

function deleteItem(b,i){
  salesData.branches[b].menu.splice(i,1);
  save();
}

// ===== BÁN =====
function sell(b,i){
  const qty=parseInt(document.getElementById(`sell-${b}-${i}`).value);
  const item=salesData.branches[b].menu[i];

  if(!qty||qty<=0||qty>item.stock) return alert('Sai số lượng');

  item.stock-=qty;

  salesData.logs.push({
    type:'sell',
    item:item.name,
    qty,
    price:item.price,
    time:new Date().toISOString()
  });

  sendTelegram(`💰 Bán ${qty} ${item.name}`);
  save();
}

// ===== NHẬP KHO (NEW) =====
function importStock(b,i){
  const qty=parseInt(document.getElementById(`import-${b}-${i}`).value);
  const item=salesData.branches[b].menu[i];

  if(!qty||qty<=0) return alert('Sai số lượng');

  item.stock+=qty;

  salesData.logs.push({
    type:'import',
    item:item.name,
    qty,
    price:0,
    time:new Date().toISOString()
  });

  sendTelegram(`📦 Nhập ${qty} ${item.name}`);
  save();
}

// =================== Server ===================
async function saveData(refresh=true){
  await fetch(SCRIPT_URL,{ method:'POST', body:JSON.stringify(salesData) });
  if(refresh) fetchSalesData();
}

// =================== Telegram ===================
async function sendTelegram(msg){
  await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({chat_id:CHAT_ID,text:msg})
  });
}

// ===== INIT =====
fetchData();
</script>

</body>
</html>

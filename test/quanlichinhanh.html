<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quản lý bán hàng Nhụy Nguyên</title>

<style>
body { font-family:sans-serif; background:#f4f4f4; padding:10px; }
.branch { background:#fff; padding:10px; margin-bottom:15px; border-radius:8px; }
table { width:100%; border-collapse:collapse; margin-top:10px; }
th,td { border:1px solid #ddd; padding:6px; text-align:center; }
th { background:#eee; }
input,button { padding:5px; margin:2px; }
.low-stock { color:red; font-weight:bold; }
</style>
</head>

<body>

<h1>📊 Quản lý bán hàng</h1>

<div>
  <input id="newBranchName" placeholder="Tên chi nhánh">
  <button onclick="addBranch()">➕ Thêm chi nhánh</button>
</div>

<hr>

<div id="branches"></div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbzfd_pHMmc9qGXJ4iT2LYXg78-WSxXVTHr5O0EeGcs5pa4RlZMB2Gs1xETul4XI-hPFTw/exec';
const TELEGRAM_TOKEN='7783089403:AAGNpG6GsdlF7VXVfPTW8Y1xQJEqBahL1PY';
const CHAT_ID='6249154937';

let salesData={branches:[],logs:[]};

// ===== FETCH =====
async function fetchData(){
  const res=await fetch(SCRIPT_URL);
  salesData=await res.json();
  render();
}

// ===== RENDER =====
function render(){
  const container=document.getElementById('branches');
  container.innerHTML='';

  salesData.branches.forEach((b,bIndex)=>{
    let html=`<div class="branch">
      <h2>${b.name}</h2>

      <table>
      <tr>
        <th>Món</th>
        <th>Tồn</th>
        <th>Giá</th>
        <th>Bán</th>
        <th>Nhập thêm</th>
        <th>Hành động</th>
      </tr>`;

    b.menu.forEach((item,iIndex)=>{
      const low=item.stock<=5;

      html+=`<tr>
        <td>${item.name}</td>

        <td class="${low?'low-stock':''}">
          ${item.stock}
        </td>

        <td>${item.price}</td>

        <td>
          <input type="number" id="sell-${bIndex}-${iIndex}" placeholder="SL">
        </td>

        <td>
          <input type="number" id="import-${bIndex}-${iIndex}" placeholder="SL">
        </td>

        <td>
          <button onclick="sell(${bIndex},${iIndex})">💰</button>
          <button onclick="importStock(${bIndex},${iIndex})">📦</button>
          <button onclick="deleteItem(${bIndex},${iIndex})">🗑</button>
        </td>
      </tr>`;
    });

    html+=`</table>

    <h4>➕ Thêm món</h4>
    <input id="name-${bIndex}" placeholder="Tên">
    <input id="stock-${bIndex}" type="number" placeholder="Tồn">
    <input id="price-${bIndex}" type="number" placeholder="Giá">
    <button onclick="addItem(${bIndex})">Thêm</button>

    </div>`;

    container.innerHTML+=html;
  });
}

// ===== CRUD =====
function addBranch(){
  const name=document.getElementById('newBranchName').value;
  if(!name) return alert('Nhập tên!');
  salesData.branches.push({name,menu:[]});
  save();
}

function addItem(bIndex){
  const name=document.getElementById(`name-${bIndex}`).value;
  const stock=parseInt(document.getElementById(`stock-${bIndex}`).value);
  const price=parseInt(document.getElementById(`price-${bIndex}`).value);

  if(!name||!stock||!price) return alert('Nhập đủ');

  salesData.branches[bIndex].menu.push({name,stock,price});
  save();
}

function deleteItem(b,i){
  salesData.branches[b].menu.splice(i,1);
  save();
}

// ===== BÁN =====
function sell(b,i){
  const qty=parseInt(document.getElementById(`sell-${b}-${i}`).value);
  const item=salesData.branches[b].menu[i];

  if(!qty||qty<=0||qty>item.stock) return alert('Sai số lượng');

  item.stock-=qty;

  salesData.logs.push({
    type:'sell',
    item:item.name,
    qty,
    price:item.price,
    time:new Date().toISOString()
  });

  sendTelegram(`💰 Bán ${qty} ${item.name}`);
  save();
}

// ===== NHẬP KHO (NEW) =====
function importStock(b,i){
  const qty=parseInt(document.getElementById(`import-${b}-${i}`).value);
  const item=salesData.branches[b].menu[i];

  if(!qty||qty<=0) return alert('Sai số lượng');

  item.stock+=qty;

  salesData.logs.push({
    type:'import',
    item:item.name,
    qty,
    price:0,
    time:new Date().toISOString()
  });

  sendTelegram(`📦 Nhập ${qty} ${item.name}`);
  save();
}

// ===== SAVE =====
async function save(){
  await fetch(SCRIPT_URL,{
    method:'POST',
    body:JSON.stringify(salesData)
  });
  fetchData();
}

// ===== TELE =====
async function sendTelegram(msg){
  await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({chat_id:CHAT_ID,text:msg})
  });
}

// ===== INIT =====
fetchData();
</script>

</body>
</html>

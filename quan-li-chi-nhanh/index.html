<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quản lý bán hàng Nhụy Nguyên</title>
<style>
  html { -webkit-text-size-adjust:100%; -moz-text-size-adjust:100%; -ms-text-size-adjust:100%; text-size-adjust:100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size:16px; line-height:1.4; background:#f4f4f4; padding:1rem; margin:0; }
  h1,h2,h3{color:#2c3e50;}
  .branch { background:white; border-radius:8px; padding:1rem; margin-bottom:1rem; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
  table { width:100%; border-collapse:collapse; table-layout:fixed; margin-top:10px; }
  th,td { border:1px solid #ddd; padding:6px; text-align:left; }
  th { background:#f0f0f0; }
  input,button,select { padding:6px; margin:2px; }
  .form-group { margin-top:10px; }
  nav { display:flex; flex-wrap:wrap; justify-content:center; background:#d9a382; padding:8px 5px; gap:8px; }
  nav a { color:white; text-decoration:none; font-size:16px; padding:6px 10px; text-align:center; flex-shrink:0; }
  @media(max-width:480px){ nav a{ font-size:14px; padding:4px 6px; } }
  .month-section{ border:1px solid #ccc; border-radius:6px; margin:1rem 0; background:white; box-shadow:0 1px 4px rgba(0,0,0,0.1); }
  .month-header{ padding:10px; background:#d9a382; color:white; cursor:pointer; font-weight:bold; }
  .month-content{ display:none; padding:10px; overflow-x:auto; }
  .month-content table{ width:100%; border-collapse:collapse; min-width:600px; }
  .month-content th,.month-content td{ padding:6px 8px; text-align:left; white-space:nowrap; border:1px solid #ddd; }
  @media(max-width:600px){
    table,thead,tbody,th,td,tr{ display:block; }
    thead{ display:none; }
    tr{ margin-bottom:0.1rem; border:1px solid #ddd; border-radius:3px; padding:3px; background:white; }
    td{ display:flex; flex-direction:column; align-items:center; justify-content:center; border:none; padding:2px 0; min-height:9px; text-align:center; white-space:normal; }
    td::before{ content:attr(data-label); font-weight:bold; color:#555; margin-bottom:2px; text-align:left; width:75%; }
    input,button,select{ width:100%; box-sizing:border-box; margin:3px 0; font-size:1rem; }
    .form-group{ margin-top:6px; }
  }
</style>
<link rel="manifest" href="../quan-li/manifest.json">
<meta name="theme-color" content="#4CAF50">
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
  navigator.serviceWorker.addEventListener('message',event=>{
    if(event.data && event.data.type==='NEW_VERSION_AVAILABLE'){
      if(confirm("Có phiên bản mới của ứng dụng. Bạn có muốn tải lại để cập nhật?")){
        window.location.reload();
      }
    }
  });
}
</script>
</head>
<nav>
  <a href="../quan-li-thu-chi/">Quản Lí Thu Chi</a>
  <a href="../quan-li-kho/">Quản Lí kho</a>
  <a href="../quan-li-menu/">Quản Lí Menu</a>
  <a href="../quan-li-nv">Quản lí nhân viên</a>
  <a href="../quan-li-sx">Quản lí sản xuất</a>
  <a href="../quan-li-chi-nhanh/">Quản Lí Chi Nhánh</a>
</nav>
<body>
<h1>📊 Quản lý bán hàng - Nhụy Nguyên</h1>

<div>
  <h2>📈 Báo cáo tổng hợp</h2>
  <div id="report"></div>
</div>

<div>
  <h2>➕ Thêm chi nhánh mới</h2>
  <input id="newBranchName" placeholder="Tên chi nhánh">
  <button onclick="addBranch()">Thêm chi nhánh</button>
</div>

<hr>
<div>
  <label>Lọc theo ngày: <input type="date" id="filterDate" onchange="renderBranches()"></label>
</div>
<hr>

<div id="branches"></div>

<script src="../auth.js"></script>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbzfd_pHMmc9qGXJ4iT2LYXg78-WSxXVTHr5O0EeGcs5pa4RlZMB2Gs1xETul4XI-hPFTw/exec';
const TELEGRAM_TOKEN='7783089403:AAGNpG6GsdlF7VXVfPTW8Y1xQJEqBahL1PY';
const CHAT_ID='6249154937';

let salesData={branches:[],logs:[],pins:{}};

// =================== Fetch dữ liệu ===================
async function fetchSalesData(){
  const res = await fetch(SCRIPT_URL);
  salesData = await res.json();
  if(!salesData.pins) salesData.pins={};
  renderBranches();
  renderReport();
}

function getFilterDate(){ return document.getElementById('filterDate').value; }

// =================== Render chi nhánh ===================
function renderBranches(){
  const container = document.getElementById('branches');
  container.innerHTML = '';

  salesData.branches.forEach((branch, bIndex) => {
    const div = document.createElement('div');
    div.className = 'branch';

    let html = `<h2>${branch.name}</h2>`;

    // ===== GROUP MENU =====
    const groupedMenu = {};

    branch.menu.forEach((item, iIndex) => {
      const cat = item.category || 'Khác';
      if (!groupedMenu[cat]) groupedMenu[cat] = [];
      groupedMenu[cat].push({ item, iIndex });
    });

    Object.keys(groupedMenu).sort().forEach(cat => {

      const safeCat = cat.toLowerCase().replace(/[^a-z0-9]/g,'-');
      const catId = `cat-${bIndex}-${safeCat}`;

      html += `
        <div style="margin-top:10px;">
          <div onclick="toggleCat('${catId}')"
            style="background:#eee;padding:10px;font-weight:bold;cursor:pointer;border-radius:6px;">
            📂 ${cat}
          </div>

          <div id="${catId}" style="display:none;padding:5px;">
      `;

      groupedMenu[cat].forEach(({item, iIndex}) => {

        html += `
          <div onclick="toggleItem('${bIndex}-${iIndex}')"
            style="background:#fafafa;margin:5px 0;padding:8px;border-radius:6px;cursor:pointer;">
            
            <div class="item-label" id="label-${bIndex}-${iIndex}">
              👉 ${item.name} (${item.stock})
            </div>

            <div id="item-${bIndex}-${iIndex}" onclick="event.stopPropagation()" style="display:none;margin-top:8px;">
              
              <input value="${item.name}"
                onchange="editItem(${bIndex},${iIndex},'name',this.value)">

              <input value="${item.category || ''}"
                onchange="editItem(${bIndex},${iIndex},'category',this.value)">

              <input value="${item.unit || ''}"
                onchange="editItem(${bIndex},${iIndex},'unit',this.value)">

              <input type="number" value="${item.stock}"
                onchange="editItem(${bIndex},${iIndex},'stock',this.value)">

              <input type="number" value="${item.cost || 0}"
                onchange="editItem(${bIndex},${iIndex},'cost',this.value)">

              <input type="number" value="${item.price}"
                onchange="editItem(${bIndex},${iIndex},'price',this.value)">

              <br>

              <input type="number" id="add-stock-${bIndex}-${iIndex}" placeholder="+ tồn">
              <button onclick="event.stopPropagation();addStock(${bIndex},${iIndex})">➕</button>

              <input type="number" id="sell-${bIndex}-${iIndex}" placeholder="bán">
              <button onclick="event.stopPropagation();sell(${bIndex},${iIndex})">Bán</button>

              <input type="number" id="waste-${bIndex}-${iIndex}" placeholder="lỗi">
              <button onclick="event.stopPropagation();waste(${bIndex},${iIndex})">Lỗi</button>

              <button onclick="event.stopPropagation();deleteItem(${bIndex},${iIndex})">🗑 Xóa</button>

            </div>
          </div>
        `;
      });

      html += `</div></div>`;
    });
    html += `
  <div class="form-group" style="margin-top:15px;padding:10px;background:#fff8f0;border-radius:8px;">
    <h4>➕ Thêm món mới</h4>

    <input placeholder="Tên món" id="new-name-${bIndex}">
    <input placeholder="Nhóm (VD: Nước, Bánh...)" id="new-category-${bIndex}">
    <input placeholder="Đơn vị" id="new-unit-${bIndex}">

    <input type="number" placeholder="Tồn kho" id="new-stock-${bIndex}">
    <input type="number" placeholder="Giá nhập" id="new-cost-${bIndex}">
    <input type="number" placeholder="Giá bán" id="new-price-${bIndex}">

    <button onclick="addItem(${bIndex})">➕ Thêm món</button>
  </div>
`;
    div.innerHTML = html;
    container.appendChild(div);
  });
}

// =================== Render báo cáo ===================
function renderReport(){
  const report=document.getElementById('report');
  const grouped={};

  salesData.logs.forEach(log=>{
    const date=log.time.slice(0,10);
    const month=log.time.slice(0,7);

    if(!grouped[month]) grouped[month]={};
    if(!grouped[month][date]) grouped[month][date]=[];

    grouped[month][date].push(log);
  });

  let html='';
  const months=Object.keys(grouped).sort((a,b)=>b.localeCompare(a));

  if(months.length===0){
    report.innerText='Không có dữ liệu để hiển thị.';
    return;
  }

  months.forEach((month,index)=>{
    const monthId=`month-${index}`;
    let monthTotal=0;
    let monthProfit=0; // ✅ thêm
    let monthTable='';

    const days=Object.keys(grouped[month]).sort((a,b)=>b.localeCompare(a));

    days.forEach(date=>{
      let dayTotal=0;
      let dayProfit=0; // ✅ thêm
      let dayRows='';

      grouped[month][date].forEach(log=>{
       let amount = 0;

if(!log.type || log.type === 'sell'){
  amount = log.price * log.quantity;
}

        // ✅ tính profit đúng chỗ
        let profit = 0;

// chỉ tính lợi nhuận khi là bán hàng
if(!log.type || log.type === 'sell'){
  profit = (log.price - (log.cost || 0)) * log.quantity;
}

        dayTotal += amount;
        monthTotal += amount;

        dayProfit += profit;
        monthProfit += profit;

        dayRows+=`<tr>
          <td data-label="Ngày">${date}</td>
          <td data-label="Chi nhánh">${log.branch}</td>
          <td data-label="Món">${log.item}</td>
          <td data-label="Số lượng">${log.quantity} ${log.unit||''}</td>
          <td data-label="Giá">
  ${(!log.type || log.type === 'sell') ? log.price.toLocaleString()+'₫' : '-'}
</td>
          <td data-label="Thành tiền">
  ${amount ? amount.toLocaleString()+'₫' : '-'}
</td>
          <td data-label="Lợi nhuận">
  ${profit ? profit.toLocaleString()+'₫' : '-'}
</td>
        </tr>`;
      });

      // ✅ tổng ngày
      dayRows+=`<tr style="background:#f1f1f1;font-weight:bold;">
        <td colspan="5">Tổng ngày ${date}</td>
        <td>${dayTotal.toLocaleString()}₫</td>
        <td>${dayProfit.toLocaleString()}₫</td>
      </tr>`;

      monthTable+=dayRows;
    });

    html+=`<div class="month-section">
      <div class="month-header" onclick="toggleMonth('${monthId}')">
        🗓 Tháng ${month} — Doanh thu: ${monthTotal.toLocaleString()}₫ | Lợi nhuận: ${monthProfit.toLocaleString()}₫
      </div>
      <div id="${monthId}" class="month-content">
        <table>
          <thead>
            <tr>
              <th>Ngày</th>
              <th>Chi nhánh</th>
              <th>Món</th>
              <th>Số lượng</th>
              <th>Giá</th>
              <th>Thành tiền</th>
              <th>Lợi nhuận</th>
            </tr>
          </thead>
          <tbody>${monthTable}</tbody>
        </table>
      </div>
    </div>`;
  });

  report.innerHTML=html;
}

function toggleMonth(id){
  const el=document.getElementById(id);
  el.style.display=(el.style.display==='none'||el.style.display==='')?'block':'none';
}
function toggleCat(id){
  const el = document.getElementById(id);
  el.style.display = (el.style.display === 'none') ? 'block' : 'none';
}

function toggleItem(id){
  const el = document.getElementById('item-' + id);
  el.style.display = (el.style.display === 'none') ? 'block' : 'none';
}
// =================== CRUD chi nhánh/món ===================
function addBranch(){
  const name=document.getElementById('newBranchName').value.trim();
  if(!name) return alert('Nhập tên chi nhánh!');
  const pin=prompt("Nhập mã PIN cho chi nhánh:");
  salesData.branches.push({name,pin,menu:[]});
  saveData();
}

function addItem(bIndex){
  const name=document.getElementById(`new-name-${bIndex}`).value.trim();
  const unit=document.getElementById(`new-unit-${bIndex}`).value.trim();
  const stock=parseInt(document.getElementById(`new-stock-${bIndex}`).value);
  const cost=parseInt(document.getElementById(`new-cost-${bIndex}`).value);
  const price=parseInt(document.getElementById(`new-price-${bIndex}`).value);
  const category=document.getElementById(`new-category-${bIndex}`).value.trim() || 'Khác';

  if(!name || !unit || isNaN(stock) || isNaN(price) || isNaN(cost))
    return alert('Nhập đủ thông tin món!');

  salesData.branches[bIndex].menu.push({
    name, unit, stock, price, cost, category
  });

  saveData(false);
renderBranches(); 
}

function editItem(bIndex,iIndex,field,value){
 if(field==='stock'||field==='price'||field==='cost'){
  value = parseInt(value) || 0;
}
  salesData.branches[bIndex].menu[iIndex][field]=value;
  saveData();
}

function deleteItem(bIndex,iIndex){
  if(!confirm('Xóa món này?')) return;
  salesData.branches[bIndex].menu.splice(iIndex,1);
  saveData();
}
function moveItem(bIndex,iIndex,direction){
  const menu=salesData.branches[bIndex].menu;
  const newIndex=iIndex+direction;
  if(newIndex<0||newIndex>=menu.length) return;
  [menu[iIndex],menu[newIndex]]=[menu[newIndex],menu[iIndex]];
  saveData(false); renderBranches();
}

// =================== Bán / Trừ lỗi ===================
function sell(bIndex,iIndex){
  const input=document.getElementById(`sell-${bIndex}-${iIndex}`);
  const qty=parseInt(input.value);
  const item=salesData.branches[bIndex].menu[iIndex];
  if(!qty||qty<=0||qty>item.stock) return alert('Số lượng không hợp lệ.');
  item.stock-=qty;
  const label = document.getElementById(`label-${bIndex}-${iIndex}`);
label.textContent = `👉 ${item.name} (${item.stock})`;
  salesData.logs.push({
  branch:salesData.branches[bIndex].name,
  item:item.name,
  unit:item.unit||'',
  quantity:qty,
  price:item.price,
  cost:item.cost || 0,
  type:'sell', // thêm
  time:new Date().toISOString()
});
  sendTelegram(`Đã bán ${qty} ${item.unit||''} ${item.name} tại ${salesData.branches[bIndex].name}`);
   saveData(false);
  input.value='';
}

function waste(bIndex,iIndex){
  const input=document.getElementById(`waste-${bIndex}-${iIndex}`);
  const qty=parseInt(input.value);
  const item=salesData.branches[bIndex].menu[iIndex];
  if(!qty||qty<=0||qty>item.stock) return alert('Số lượng trừ lỗi không hợp lệ.');
  item.stock-=qty;
  const label = document.getElementById(`label-${bIndex}-${iIndex}`);
label.textContent = `👉 ${item.name} (${item.stock})`;
  salesData.logs.push({
    branch:salesData.branches[bIndex].name,
    item:item.name,
    unit:item.unit||'',
    quantity:qty,
    price:0,
    type:'waste',
    time:new Date().toISOString()
  });
  sendTelegram(`Trừ lỗi ${qty} ${item.unit||''} ${item.name} tại ${salesData.branches[bIndex].name}`);
   saveData(false);
  input.value='';
}

// =================== PIN ===================
function editPin(bIndex,newPin){
  const branchName=salesData.branches[bIndex].name;
  salesData.branches[bIndex].pin=newPin;
  for(const pin in salesData.pins){ if(salesData.pins[pin]===branchName) delete salesData.pins[pin]; }
  salesData.pins[newPin]=branchName;
  saveData(false);
}
function togglePin(bIndex){
  const input=document.getElementById(`pin-${bIndex}`);
  input.type=input.type==='password'?'text':'password';
}

// =================== Server ===================
async function saveData(refresh=true){
  await fetch(SCRIPT_URL,{ method:'POST', body:JSON.stringify(salesData),keepalive: true });
  if(refresh) fetchSalesData();
}
//////cong ton kho
function addStock(bIndex,iIndex){
  const input = document.getElementById(`add-stock-${bIndex}-${iIndex}`);
  const qty = parseInt(input.value);

  if(!qty || qty <= 0) return alert('Số lượng nhập không hợp lệ');

  const item = salesData.branches[bIndex].menu[iIndex];

  item.stock += qty;

  // ✅ update label đúng cách
  const label = document.getElementById(`label-${bIndex}-${iIndex}`);
  label.textContent = `👉 ${item.name} (${item.stock})`;

  salesData.logs.push({
    branch:salesData.branches[bIndex].name,
    item:item.name,
    unit:item.unit||'',
    quantity:qty,
    price:0,
    cost:item.cost || 0,
    type:'import',
    time:new Date().toISOString()
  });

  saveData(false);
  input.value = '';
}
// =================== Telegram ===================
async function sendTelegram(msg){
  await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({chat_id:CHAT_ID,text:msg}),
    keepalive: true,
  });
}

// =================== Init ===================
fetchSalesData();
</script>
</body>
</html>
